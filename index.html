<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM System - GCE Erode</title>
    <meta name="description"
        content="Student Alumni Mentorship System for Government College of Engineering, Erode. Browse departments, batches, teams, and students.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260301">
</head>

<body>
    <!-- Premium Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <svg class="splash-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4L35 12V28L20 36L5 28V12L20 4Z" fill="rgba(37,99,235,0.1)" stroke="var(--accent-blue)"
                    stroke-width="2" />
                <path d="M20 10L29 15V25L20 30L11 25V15L20 10Z" fill="rgba(37,99,235,0.2)" />
                <circle cx="20" cy="18" r="4" fill="var(--accent-blue)" />
                <path d="M14 28C14 24.686 16.686 22 20 22C23.314 22 26 24.686 26 28" stroke="var(--accent-blue)"
                    stroke-width="2" fill="none" />
            </svg>
            <h2 class="splash-title">SAM Engine</h2>
            <div class="splash-loader"></div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4L35 12V28L20 36L5 28V12L20 4Z" fill="rgba(255,255,255,0.2)" stroke="white"
                    stroke-width="2" />
                <path d="M20 10L29 15V25L20 30L11 25V15L20 10Z" fill="rgba(255,255,255,0.3)" />
                <circle cx="20" cy="18" r="4" fill="white" />
                <path d="M14 28C14 24.686 16.686 22 20 22C23.314 22 26 24.686 26 28" stroke="white" stroke-width="2"
                    fill="none" />
            </svg>
            <div>
                <h1 class="nav-title">SAM System</h1>
                <p class="nav-subtitle">Student Alumni Mentorship</p>
            </div>
        </div>
        <div class="nav-info">Government College of Engineering, Erode</div>
        <div class="nav-actions">
            <!-- User Badge (Hidden by default) -->
            <div id="user-badge" class="user-badge" style="display: none;"></div>

            <button class="admin-btn" id="admin-toggle" onclick="toggleAdminLogin()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0110 0v4" />
                </svg>
                <span id="admin-btn-text">Login</span>
            </button>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="breadcrumb-bar" id="breadcrumb-bar">
        <div class="breadcrumb-inner">
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item active">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                    </svg>
                    GCE Erode
                </span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Dynamic content rendered by JS -->
    </main>

    <!-- Admin Login Modal -->
    <div class="modal-overlay" id="admin-modal" style="display:none">
        <div class="modal-card modal-card-auth" style="max-width: 420px; padding: 36px">
            <div class="modal-header-login"
                style="display:flex; flex-direction:column; align-items:center; text-align:center; gap:6px;">
                <h3 style="margin:0;">Admin Login</h3>
                <p style="color:var(--text-light); font-size:0.88rem; margin:0;">Enter admin password to continue
                </p>
            </div>

            <div style="margin-top: 24px;">
                <div class="pw-wrapper">
                    <input type="password" id="admin-password" class="modal-input login-input" placeholder="Password"
                        onkeypress="if(event.key==='Enter')attemptLogin()">
                    <button type="button" class="pw-eye" onclick="togglePwEye()" title="Show/hide password">
                        <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
                <p class="modal-error" id="login-error" style="display:none; margin-top: 12px; margin-bottom: 0;">
                    Incorrect password. Please try again.</p>
                <div class="login-actions" style="margin-top: 28px;">
                    <button class="btn-primary" onclick="attemptLogin()"
                        style="width:100%;padding:13px 24px;">Login</button>
                </div>
            </div>

            <button class="modal-close" onclick="closeAdminLogin()">✕</button>
        </div>
    </div>

    <script src="data/ate_subjects.js"></script>
    <script src="data/subjects_data.js"></script>
    <script src="data/students_data.js"></script>
    <script src="js/app.js?v=20260302-2"></script>
</body>

</html>
