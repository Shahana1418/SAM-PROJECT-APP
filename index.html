<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM System - GCE Erode</title>
    <meta name="description"
        content="Student Alumni Mentorship System for Government College of Engineering, Erode. Browse departments, batches, teams, and students.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4L35 12V28L20 36L5 28V12L20 4Z" fill="rgba(255,255,255,0.2)" stroke="white"
                    stroke-width="2" />
                <path d="M20 10L29 15V25L20 30L11 25V15L20 10Z" fill="rgba(255,255,255,0.3)" />
                <circle cx="20" cy="18" r="4" fill="white" />
                <path d="M14 28C14 24.686 16.686 22 20 22C23.314 22 26 24.686 26 28" stroke="white" stroke-width="2"
                    fill="none" />
            </svg>
            <div>
                <h1 class="nav-title">SAM System</h1>
                <p class="nav-subtitle">Student Alumni Mentorship</p>
            </div>
        </div>
        <div class="nav-info">Government College of Engineering, Erode</div>
        <div class="nav-actions">
            <button class="admin-btn" id="admin-toggle" onclick="toggleAdminLogin()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0110 0v4" />
                </svg>
                <span id="admin-btn-text">Admin</span>
            </button>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="breadcrumb-bar" id="breadcrumb-bar">
        <div class="breadcrumb-inner">
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item active">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                    </svg>
                    GCE Erode
                </span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Dynamic content rendered by JS -->
    </main>

    <!-- Admin Login Modal -->
    <div class="modal-overlay" id="admin-modal" style="display:none">
        <div class="modal-card">
            <h3>Admin Login</h3>
            <p>Enter admin password to access management features.</p>
            <div class="modal-input-group">
                <input type="password" id="admin-password" class="modal-input" placeholder="Password"
                    onkeypress="if(event.key==='Enter')attemptLogin()">
                <button class="btn-primary" onclick="attemptLogin()" style="width:auto;padding:10px 24px">
                    Login
                </button>
            </div>
            <p class="modal-error" id="login-error" style="display:none">Incorrect password</p>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
    </div>

    <script src="data/students_data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
